<section class="card">
  <header class="card-header">
    <h2>Nueva Descarga</h2>
    <p>Pega el enalce del video para consultar su información.</p>
  </header>
  <form id="download-form">
    <label for="video-url"> URL del video </label>
    <input
      id="video-url"
      class="input"
      type="url"
      placeholder="https://..."
      autocomplete="off"
      required
    />
    <button class="btn" type="submit">Obtener información</button>
  </form>
</section>
